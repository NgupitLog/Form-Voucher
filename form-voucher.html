<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Voucher</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;padding:20px;margin:0}
h2{color:#0b4ea2;margin-top:0}
h3{color:#0b4ea2;margin:0 0 10px 0}

.header,.biaya-block{
  background:#fff;
  padding:15px;
  border-radius:6px;
  margin-bottom:20px;
  border-left:5px solid #ff8c00;
  position:relative;
}

label{font-size:12px;font-weight:bold;display:block;margin-bottom:2px;white-space:nowrap}
input,select{width:100%;padding:6px;margin-bottom:6px;font-size:13px;box-sizing:border-box;border:1px solid #ccc;border-radius:3px}
input:focus,select:focus{outline:2px solid #0b4ea2;border-color:#0b4ea2}

.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
.row + .row{margin-top:4px}
.col{position:relative}

.col.blawb{flex:1.6;min-width:150px}
.col.aju{flex:1;min-width:110px}
.col.tipe{flex:.8;min-width:100px}
.col.bank{flex:1;min-width:110px}
.col.norek{flex:1;min-width:110px}
.col.akun{flex:1.4;min-width:160px}
.col.pemasok{flex:1.6;min-width:180px}
.col.ket{flex:1.8;min-width:180px}
.col.nominal{flex:1;min-width:120px}
.col.atasnama{flex:1;min-width:130px}
.col.pic{flex:1;min-width:180px}
.col.sumberdana{flex:1.6;min-width:220px}

.combo-list{
  position:absolute;
  z-index:20;
  top:100%;
  left:0;
  right:0;
  background:#fff;
  border:1px solid #ccc;
  border-radius:3px;
  max-height:200px;
  overflow-y:auto;
  display:none;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}
.combo-list div{padding:6px 8px;cursor:pointer;font-size:13px}
.combo-list div:hover{background:#eef4ff}

.btn{
  background:#ff8c00;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:4px;
  cursor:pointer;
  font-size:13px;
}
.btn-blue{background:#0b4ea2}
.btn-danger{background:#e74c3c;padding:4px 10px;font-size:12px;position:absolute;top:15px;right:15px}

.section-label{font-weight:bold;color:#0b4ea2;margin-bottom:10px;font-size:14px;letter-spacing:.5px}

@media(max-width:768px){
  .row{flex-direction:column}
  .col{min-width:100%!important}
  .btn{width:100%}
}
</style>
</head>

<body>

<h2>Form Voucher</h2>

<div class="header">
  <div class="row">
    <div class="col pic">
      <label>PIC</label>
      <select id="pic">
        <option value="">-- pilih --</option>
      </select>
    </div>

    <div class="col tipe">
      <label>Sumber Dana</label>
      <select id="sumberDana">
        <option value="">-- pilih --</option>
        <option value="PBL">PBL</option>
        <option value="NAL">NAL</option>
      </select>
    </div>

    <div class="col sumberdana companyNameCol">
      <label>Company Name</label>
    </div>
  </div>
</div>

<div id="biayaContainer"></div>

<button class="btn btn-blue" id="btnAddBiaya">+ Tambah Biaya</button>
<br><br>
<button class="btn" id="btnSubmit">SUBMIT</button>

/* ================= COMBO SEARCH HELPER (Sumber Dana / Pemasok / Akun) ================= */
function buildCombo(col, list, placeholder, nameOnly){
  col.innerHTML = col.querySelector("label").outerHTML + `
    <input class="comboSearch" placeholder="${placeholder}" autocomplete="off">
    <input type="hidden" class="comboValueKode">
    <div class="combo-list"></div>
  `;

  const searchInput = col.querySelector(".comboSearch");
  const hiddenInput = col.querySelector(".comboValueKode");
  const listEl = col.querySelector(".combo-list");

  function render(filtered){
    listEl.innerHTML = "";
    filtered.forEach(item=>{
      const opt = document.createElement("div");
      opt.textContent = nameOnly ? item.nama : `${item.kode}; ${item.nama}`;
      opt.onclick = ()=>{
        searchInput.value = nameOnly ? item.nama : `${item.kode}; ${item.nama}`;
        hiddenInput.value = item.kode;
        listEl.style.display = "none";
      };
      listEl.appendChild(opt);
    });
    listEl.style.display = filtered.length ? "block" : "none";
  }

  searchInput.addEventListener("input", ()=>{
    hiddenInput.value = "";
    const q = searchInput.value.toLowerCase();
    const filtered = list.filter(i =>
      i.nama.toLowerCase().includes(q) || i.kode.toLowerCase().includes(q)
    );
    render(filtered);
  });

  searchInput.addEventListener("focus", ()=>{
    render(list);
  });

  document.addEventListener("click", (e)=>{
    if(!col.contains(e.target)){
      listEl.style.display = "none";
    }
  });

  return { searchInput, hiddenInput };
}

    companyName: companyNameCol.querySelector(".comboSearch") ? companyNameCol.querySelector(".comboSearch").value : "",
    sumberDana: sumberDana.value,
    vouchers: []
  };

  document.querySelectorAll(".biaya-block").forEach(block=>{
    const pemasokCol = block.querySelector(".pemasokCol");
    const akunCol = block.querySelector(".akunCol");

    data.vouchers.push({
      pemasokKode: pemasokCol.querySelector(".comboValueKode").value,
      pemasokNama: pemasokCol.querySelector(".comboSearch").value,
      blAwb: block.querySelector(".blAwb").value,
      aju: block.querySelector("input.aju").value,
      tipe: block.querySelector("select.tipe").value,
      bank: block.querySelector("input.bank").value,
      atasNamaRekening: block.querySelector(".atasNama").value,
      noRekening: block.querySelector(".noRekening").value,
      akunKode: akunCol.querySelector(".comboValueKode").value,
      akunNama: akunCol.querySelector(".comboSearch").value,
      nominal: Number(block.querySelector("input.nominal").value || 0),
      keterangan: block.querySelector(".keterangan").value
    });
  });

  fetch(SCRIPT_URL + "?" + new URLSearchParams({
    action: "submit",
    data: JSON.stringify(data)
  }).toString(), {
    method: "GET",
    mode: "no-cors"
  })
  .then(()=>{
    alert("BERHASIL — DATA TERINPUT");
    location.reload();
  })
  .catch(()=>{
    alert("GAGAL");
  })
  .finally(()=>{
    submitting = false;
    btnSubmit.disabled = false;
    btnSubmit.innerText = "SUBMIT";
  });
};

});
</script>

</body>
</html>
